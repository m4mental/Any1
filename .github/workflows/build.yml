name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Target Repository को चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'ankurCES/project_mythara'

      # 2. Java Environment (JDK) सेट अप करना
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Gradle wrapper को एग्जीक्यूटेबल परमिशन देना
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Debug APK बिल्ड करना (यहाँ GITHUB_TOKEN जोड़ा गया है)
      - name: Build Debug APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :app:assembleDebug

      # 5. जनरेट हुए APK को Artifact के रूप में अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
